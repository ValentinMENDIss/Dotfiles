background {
    monitor =
    path = ~/Pictures/wallpapers/BlossomsCatppuccin_wide.png
    blur_passes = 2
    brightness = 0.55
}

input-field {
    monitor =
    size = 20%, 8%
    dots_size = 0.15

    outline_thickness = 2
    inner_color = rgba(26, 26, 26, 0.8)

    outer_color = rgb(26, 26, 26)
    check_color = rgb(166, 209, 137)
    fail_color = rgb(231, 130, 132)

    font_color = rgb(230, 230, 230)
    fade_on_empty = false
    rounding = 10

    position = 0, -20
    halign = center
    valign = center    
    hide_input = false
    placeholder_text = Password
}

label {
    monitor =
    text = Waiting for $USER
    color = rgb(190, 190, 190)
    font_size = 25
    font_family = monospace

    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(190, 190, 190)
    font_size = 70
    font_family = monospace

    position = 0, 300
    halign = center
    valign = center
}
